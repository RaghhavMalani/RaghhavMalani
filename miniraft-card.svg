<svg viewBox="0 0 1000 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="220" rx="14" fill="#04060b"/>
  <rect x="0.5" y="0.5" width="999" height="219" rx="14" stroke="#1d2638"/>

  <text x="40" y="46" fill="#e6edf3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="650">miniRAFT</text>
  <text x="40" y="70" fill="#7d8aa0" font-family="Consolas, Menlo, monospace" font-size="12.5">consensus from scratch — leader election · log replication · catch-up sync</text>

  <!-- links leader->followers -->
  <line x1="560" y1="120" x2="720" y2="70" stroke="#22304a" stroke-width="1.5"/>
  <line x1="560" y1="120" x2="720" y2="170" stroke="#22304a" stroke-width="1.5"/>

  <!-- heartbeats -->
  <g filter="url(#rg)">
    <circle r="4" fill="#fbbf24">
      <animateMotion path="M 560 120 L 720 70" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.8;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#fbbf24">
      <animateMotion path="M 560 120 L 720 170" dur="1.6s" begin="0.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.8;1" dur="1.6s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- leader -->
  <circle cx="560" cy="120" r="26" fill="#0b1220" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="560" cy="120" r="26" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6">
    <animate attributeName="r" values="26;36" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="560" y="125" text-anchor="middle" fill="#fbbf24" font-family="Consolas, Menlo, monospace" font-size="13">LDR</text>

  <!-- followers -->
  <circle cx="720" cy="70" r="20" fill="#0b1220" stroke="#3d5a80" stroke-width="1.5"/>
  <text x="720" y="75" text-anchor="middle" fill="#8494ac" font-family="Consolas, Menlo, monospace" font-size="11">F1</text>
  <circle cx="720" cy="170" r="20" fill="#0b1220" stroke="#3d5a80" stroke-width="1.5"/>
  <text x="720" y="175" text-anchor="middle" fill="#8494ac" font-family="Consolas, Menlo, monospace" font-size="11">F2</text>

  <!-- replicated log -->
  <g font-family="Consolas, Menlo, monospace" font-size="10" fill="#51607a">
    <text x="820" y="98">log</text>
  </g>
  <g>
    <rect x="820" y="106" width="22" height="22" rx="4" fill="#123" stroke="#22d3ee" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.4s" fill="freeze"/>
    </rect>
    <rect x="848" y="106" width="22" height="22" rx="4" fill="#123" stroke="#22d3ee" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </rect>
    <rect x="876" y="106" width="22" height="22" rx="4" fill="#123" stroke="#22d3ee" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.9s" dur="0.4s" fill="freeze"/>
    </rect>
    <rect x="904" y="106" width="22" height="22" rx="4" fill="#123" stroke="#a78bfa" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="2.7s" dur="0.4s" fill="freeze"/>
    </rect>
  </g>
</svg>