<svg viewBox="0 0 1000 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="250" rx="14" fill="#05070d"/>
  <rect x="0.5" y="0.5" width="999" height="249" rx="14" stroke="#1c2434"/>

  <text x="50" y="52" fill="#7d8aa0" font-family="Consolas, Menlo, monospace" font-size="14" letter-spacing="0.5">same 20.95 km optimal route — three ways to find it</text>

  <!-- Dijkstra -->
  <text x="50" y="98" fill="#b8c2d0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600">Dijkstra</text>
  <rect x="240" y="86" height="14" rx="7" fill="#31405c" width="0">
    <animate attributeName="width" values="0;640" dur="1.1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
  <text x="900" y="98" text-anchor="end" fill="#e6edf3" font-family="Consolas, Menlo, monospace" font-size="16">96,830<tspan fill="#586274" font-size="12"> nodes</tspan></text>

  <!-- A* -->
  <text x="50" y="146" fill="#b8c2d0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600">A*</text>
  <rect x="240" y="134" height="14" rx="7" fill="#3d5a80" width="0">
    <animate attributeName="width" values="0;168" dur="1.1s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
  <text x="900" y="146" text-anchor="end" fill="#e6edf3" font-family="Consolas, Menlo, monospace" font-size="16">13,554<tspan fill="#586274" font-size="12"> nodes</tspan></text>

  <!-- CH -->
  <text x="50" y="194" fill="#b8c2d0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="600">Contraction Hierarchies</text>
  <rect x="240" y="182" height="14" rx="7" fill="url(#ch)" width="0">
    <animate attributeName="width" values="0;14" dur="1.1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
  </rect>
  <text x="900" y="194" text-anchor="end" font-family="Consolas, Menlo, monospace" font-size="16" fill="#22d3ee" font-weight="700">846<tspan fill="#586274" font-size="12" font-weight="400"> nodes — 0.9% of the work</tspan></text>

  <text x="50" y="228" fill="#4a5568" font-family="Consolas, Menlo, monospace" font-size="12">Electronic City → Whitefield · 220,723-node real Bengaluru road graph · identical path, exact-match correctness gate</text>
</svg>
